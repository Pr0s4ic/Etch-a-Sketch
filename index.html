<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Etch-a-Sketch</title>
</head>
<body>
    <nav>
        <h1>Etch-a-Sketch</h1>
    </nav>

    <div class="container">
        <div class="tools">
            <p class="option pen-mode active">Pen Mode</p>
            <p class="option color-mode">Color Mode</p>
            <p class="option eraser-mode">Eraser Mode</p>
            <p class="option clear">Clear</p>
            <div class="sizes">
                <p>Sizes: </p>
                <p class="size s1">16 x 16</p>
                <p class="size s2">32 x 32</p>
                <p class="size s3">64 x 64</p>
            </div>
        </div>

        <div class="zone" data-tool="penMode">
            <h1>Select a size!</h1>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
